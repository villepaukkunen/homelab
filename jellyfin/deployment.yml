apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: jellyfin
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      nodeSelector:
        streaming: "true"
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - containerPort: 8096
              name: web
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_CUSTOM_CONFIG
              value: /gluetun/custom.conf
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: vpn-credentials
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vpn-credentials
                  key: OPENVPN_PASSWORD
            - name: DNS_KEEP_NAMESERVER
              value: 'on'
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: '10.43.0.10/32,192.168.10.55/32'
          volumeMounts:
            - mountPath: /gluetun/custom.conf
              name: jellyfin-ovpn-conf
              subPath: custom.conf
      containers:
        - name: jellyfin
          image: ghcr.io/jellyfin/jellyfin:10.11.10
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            capabilities:
              drop:
                - "ALL"
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: JELLYFIN_PublishedServerUrl
              value: https://jellyfin.mandariini.uk
          resources:
              requests:
                  gpu.intel.com/i915: "1"
              limits:
                  gpu.intel.com/i915: "1"
          volumeMounts:
            - mountPath: /run
              name: jellyfin
              subPath: run
            - mountPath: /cache/transcodes
              name: emptydir
              subPath: transcodes
            - mountPath: /config
              name: jellyfin
              subPath: config
            - mountPath: /cache
              name: jellyfin
              subPath: cache
            - mountPath: /data/movies
              name: media
              subPath: movies
            - mountPath: /data/tvseries
              name: media
              subPath: tvseries
            - mountPath: /data/livetv
              name: media
              subPath: livetv
            - mountPath: /config/config/logging.json
              name: config
              subPath: logging.json
      volumes:
        - name: jellyfin-ovpn-conf
          secret:
            secretName: jellyfin-ovpn-conf
        - name: jellyfin
          persistentVolumeClaim:
            claimName: jellyfin
        - name: emptydir
          emptyDir: {}
        - name: media
          persistentVolumeClaim:
            claimName: media
        - name: config
          configMap:
            name: config