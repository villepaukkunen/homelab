---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: searxng
  name: searxng
  namespace: searxng
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        storage: longhorn
      initContainers:
        - name: hotio
          image: ghcr.io/hotio/base:alpinevpn-663c831-615-linux-amd64
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - containerPort: 8080
              name: web
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: VPN_ENABLED
              value: "true"
            - name: VPN_LAN_NETWORK
              value: '10.43.0.0/16'
            - name: VPN_LAN_LEAK_ENABLED
              value: "true"
            - name: VPN_EXPOSE_PORTS_ON_LAN
              value: "8080/tcp"
            - name: VPN_NAMESERVERS
              value: '10.43.0.10'
          envFrom:
            - secretRef:
                name: vpn-credentials
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:2026.6.6-e260a732c
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
          env:
            - name: SEARXNG_BASE_URL
              value: https://search.mandariini.uk
            - name: SEARXNG_PORT
              value: '8080'
          volumeMounts:
            - name: searxng
              mountPath: /etc/searxng
            - name: searxng-settings-volume
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
      volumes:
        - name: searxng
          persistentVolumeClaim:
            claimName: searxng
        - name: searxng-settings-volume
          secret:
            secretName: settings-yml
