nextcloud:
  host: cloud.mandariini.uk
  existingSecret:
    enabled: true
    secretName: envsecrets
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
    smtpUsernameKey: smtp-username
    smtpPasswordKey: smtp-password
    smtpHostKey: smtp-host
  trustedDomains: cloud.mandariini.uk
  mail:
    enabled: true
    fromAddress: cloud
    domain: mandariini.uk
    smtp:
      secure: ""
      port: 587
      authtype: LOGIN
  securityContext:
    allowPrivilegeEscalation: false
  podSecurityContext:
    runAsUser: 33
    runAsGroup: 33
    fsGroup: 33
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    fsGroupChangePolicy: "OnRootMismatch"
  mariaDbInitContainer:
    securityContext:
      allowPrivilegeEscalation: false

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  existingSecret:
    enabled: true
    secretName: envsecrets
    usernameKey: mariadb-username
    passwordKey: mariadb-password

mariadb:
  enabled: true
  auth:
    existingSecret: envsecrets
  primary:
    nodeSelector:
      storage: longhorn
    persistence:
      enabled: true
      existingClaim: db

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    nodeSelector:
      storage: longhorn
    persistence:
      enabled: true
      existingClaim: redis
  replica:
    persistence:
      enabled: false

cronjob:
  enabled: true
  type: cronjob
  cronjob:
    affinity:
      podAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - nextcloud
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - app
            topologyKey: kubernetes.io/hostname
    securityContext:
      runAsUser: 33
      runAsGroup: 33
      runAsNonRoot: true
      allowPrivilegeEscalation: false

persistence:
  enabled: true
  existingClaim: config
  nextcloudData:
    enabled: true
    existingClaim: data

nodeSelector:
  storage: longhorn