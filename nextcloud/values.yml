nextcloud:
  host: cloud.mandariini.uk
  existingSecret:
    enabled: true
    secretName: envsecrets
    usernameKey: nextcloud-username
    passwordKey: nextcloud-password
    smtpUsernameKey: smtp-username
    smtpPasswordKey: smtp-password
    smtpHostKey: smtp-host
  trustedDomains: cloud.mandariini.uk
  mail:
    enabled: true
    fromAddress: cloud
    domain: mandariini.uk
    smtp:
      secure: ""
      port: 587
      authtype: LOGIN
  securityContext:
    allowPrivilegeEscalation: false
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
    fsGroupChangePolicy: "OnRootMismatch"
  mariaDbInitContainer:
    securityContext:
      allowPrivilegeEscalation: false

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true

  existingSecret:
    enabled: true
    secretName: envsecrets
    usernameKey: mariadb-username
    passwordKey: mariadb-password

mariadb:
  enabled: true
  auth:
    existingSecret: envsecrets
  primary:
    nodeSelector:
      storage: longhorn
    persistence:
      enabled: true
      existingClaim: db

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    nodeSelector:
      storage: longhorn
    persistence:
      enabled: true
      existingClaim: redis
  replica:
    persistence:
      enabled: false

collabora:
  enabled: true
  collabora:
    extra_params: --o:ssl.enable=false --o:ssl.termination=true --o:net.proto=IPv4 --o:net.post_allow.host=10\.42\.0\.0/16 --o:net.post_allow.host=10\.43\.0\.0/16
    existingSecret:
      enabled: true
      secretName: "collabora-admin-credentials"
      usernameKey: "username"
      passwordKey: "password"

cronjob:
  enabled: true
  sidecar:
    securityContext:
      allowPrivilegeEscalation: false

persistence:
  enabled: true
  existingClaim: config

  nextcloudData:
    enabled: true
    existingClaim: data

nodeSelector:
  storage: longhorn