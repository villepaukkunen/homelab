---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations: 
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
    - websecxt
  routes:
    - kind: Rule
      match: Host(`cloud.mandariini.uk`)
      services:
        - name: nextcloud
          port: 8080
      middlewares:
        - name: default-headers
          namespace: default
  tls:
    secretName: mandariini-uk-tls