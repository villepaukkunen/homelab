---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: unbound
    release: unbound-6
  name: unbound-6
  namespace: unbound
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unbound
      release: unbound-6
  template:
    metadata:
      labels:
        app: unbound
        release: unbound-6
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - unbound
                topologyKey: "kubernetes.io/hostname"
      initContainers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - name: dns
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: SERVER_REGIONS
              valueFrom:
                secretKeyRef:
                  name: envsecrets
                  key: UNBOUND_6_SERVER_REGIONS
            - name: DNS_KEEP_NAMESERVER
              value: 'on'
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: '10.43.0.10/32'
          envFrom:
            - secretRef:
                name: vpn-credentials
          volumeMounts:
            - mountPath: /gluetun
              name: gluetun
      containers:
        - name: unbound-6
          image: mvance/unbound:1.22.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: unbound-main-conf-volume
              mountPath: /opt/unbound/etc/unbound/unbound.conf
              subPath: unbound.conf
      volumes:
        - name: gluetun
          persistentVolumeClaim:
            claimName: gluetun
        - name: unbound-main-conf-volume
          configMap:
            name: unbound-main-conf
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: unbound
    release: unbound-6
  name: unbound-6
  namespace: unbound
spec:
  selector:
    app: unbound
    release: unbound-6
  type: ClusterIP
  clusterIP: 10.43.0.16
  ports:
    - name: dns
      port: 53
      protocol: TCP
      targetPort: 53
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53