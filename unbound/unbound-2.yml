---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: unbound
    release: unbound-2
  name: unbound-2
  namespace: unbound
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unbound
      release: unbound-2
  template:
    metadata:
      labels:
        app: unbound
        release: unbound-2
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - unbound
                topologyKey: "kubernetes.io/hostname"
      initContainers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - name: dns
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_CUSTOM_CONFIG
              value: /gluetun/custom.conf
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: vpn-credentials
                  key: OPENVPN_USER
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vpn-credentials
                  key: OPENVPN_PASSWORD
            - name: DNS_KEEP_NAMESERVER
              value: 'on'
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: '10.43.0.10/32'
          volumeMounts:
            - mountPath: /gluetun/custom.conf
              name: unbound-2-ovpn-conf
              subPath: custom.conf
      containers:
        - name: unbound-2
          image: mvance/unbound:1.22.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: unbound-main-conf-volume
              mountPath: /opt/unbound/etc/unbound/unbound.conf
              subPath: unbound.conf
      volumes:
        - name: unbound-2-ovpn-conf
          secret:
            secretName: unbound-2-ovpn-conf
        - name: unbound-main-conf-volume
          configMap:
            name: unbound-main-conf
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: unbound
    release: unbound-2
  name: unbound-2
  namespace: unbound
spec:
  selector:
    app: unbound
    release: unbound-2
  type: ClusterIP
  clusterIP: 10.43.0.12
  ports:
    - name: dns
      port: 53
      protocol: TCP
      targetPort: 53
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53