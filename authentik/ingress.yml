---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: authentik
  annotations: 
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - websecure
    - websecxt
  routes:
    - kind: Rule
      match: Host(`auth.mandariini.uk`)
      services:
        - name: authentik-server
          port: 80
  tls:
    secretName: mandariini-uk-tls