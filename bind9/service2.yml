---
apiVersion: v1
kind: Service
metadata:
  name: bind9-2
  namespace: bind9
spec:
  selector:
    app: bind9-2
  type: LoadBalancer
  externalTrafficPolicy: Local
  loadBalancerIP: 192.168.10.60
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: dns-tcp
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: dns-udp
    - name: rndc
      port: 953
      protocol: TCP
      targetPort: rndc